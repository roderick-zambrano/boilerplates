[services]
[services.apprise]
image = "caronc/apprise:latest"
security_opt = [ "no-new-privileges:true" ]
container_name = "apprise"
hostname = "apprise"
# ports = ["8000:8000"]
networks = [
  "swag"
]
user = "1000:1000"
# user = "${PUID:-1000}:${PGID:-1000}"
[services.apprise.environment]
APPRISE_STATEFUL_MODE = "simple"
APPRISE_WORKER_COUNT = "1"
APPRISE_ADMIN = "y"
TZ = "America/Panama"
[[services.apprise.volumes]]
type = "volume"
source = "config"
target = "/config"
[[services.apprise.volumes]]
type = "volume"
source = "plugin"
target = "/plugin"
[[services.apprise.volumes]]
type = "volume"
source = "attach"
target = "/attach"

[volumes.config]
[volumes.plugin]
[volumes.attach]
[networks.swag]
external = true
